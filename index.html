<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대한검정회 5급 한자 학습</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: #f9f9f7; color: #1a1a1a; min-height: 100vh; }

.hero { padding: 3rem 1.5rem 2rem; text-align: center; }
.hero-badge { display: inline-block; background: #e6f1fb; color: #185fa5; font-size: 12px; font-weight: 500; padding: 4px 14px; border-radius: 20px; margin-bottom: 1rem; }
.hero-title { font-size: 26px; font-weight: 500; color: #1a1a1a; margin-bottom: 8px; }
.hero-sub { font-size: 14px; color: #888; line-height: 1.6; }

.progress-section { max-width: 480px; margin: 0 auto 2.5rem; padding: 0 1.5rem; }
.prog-label-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
.prog-label-text { font-size: 13px; color: #555; }
.prog-label-count { font-size: 13px; color: #888; }
.prog-track { height: 6px; background: #e0e0dc; border-radius: 3px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #378add, #7f77dd); transition: width 0.6s ease; }

.stages { max-width: 520px; margin: 0 auto; padding: 0 1.5rem 4rem; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.stage-card { border-radius: 14px; padding: 1.25rem 1.25rem 1rem; text-decoration: none; display: flex; flex-direction: column; gap: 10px; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
.stage-card.active { background: #fff; border: 0.5px solid #e0e0dc; cursor: pointer; }
.stage-card.active:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
.stage-card.locked { background: #f5f5f2; border: 0.5px solid #e8e8e4; cursor: default; }

.stage-num { font-size: 11px; font-weight: 500; }
.stage-card.active .stage-num { color: #aaa; }
.stage-card.locked .stage-num { color: #ccc; }

.stage-title { font-size: 15px; font-weight: 500; }
.stage-card.active .stage-title { color: #1a1a1a; }
.stage-card.locked .stage-title { color: #ccc; }

.stage-chars { font-size: 18px; font-family: serif; letter-spacing: 2px; line-height: 1.5; }
.stage-card.active .stage-chars { color: #444; }
.stage-card.locked .stage-chars { color: #ddd; }

.stage-footer { display: flex; align-items: center; justify-content: space-between; }
.stage-count { font-size: 11px; }
.stage-card.active .stage-count { color: #aaa; }
.stage-card.locked .stage-count { color: #ccc; }

.stage-arrow { font-size: 14px; }
.stage-card.active .stage-arrow { color: #bbb; }
.stage-card.locked .stage-arrow { color: #e0e0dc; }

.stage-color-bar { position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 14px 14px 0 0; }

.lock-icon { position: absolute; top: 12px; right: 12px; width: 18px; height: 18px; opacity: 0.3; }

.notice { max-width: 520px; margin: 0 auto 2rem; padding: 0 1.5rem; }
.notice-box { background: #fff; border: 0.5px solid #e0e0dc; border-radius: 10px; padding: .875rem 1rem; font-size: 12px; color: #888; line-height: 1.6; text-align: center; }

@media (prefers-color-scheme: dark) {
  body { background: #1a1a1a; color: #f0f0ec; }
  .hero-title { color: #f0f0ec; }
  .stage-card.active { background: #2a2a28; border-color: #3a3a38; }
  .stage-card.locked { background: #222220; border-color: #2e2e2c; }
  .stage-card.active .stage-title { color: #f0f0ec; }
  .stage-card.active .stage-chars { color: #aaa; }
  .prog-track { background: #3a3a38; }
  .notice-box { background: #2a2a28; border-color: #3a3a38; color: #666; }
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">대한검정회 한자급수자격검정</div>
  <div class="hero-title">5급 한자 학습</div>
  <div class="hero-sub">단계를 선택해서 공부를 시작해요!<br>한자 학습 → 한자어 → 퀴즈 → 테스트 순서로 해보세요 😊</div>
</div>

<div class="progress-section">
  <div class="prog-label-row">
    <span class="prog-label-text">전체 진도</span>
    <span class="prog-label-count" id="prog-count">2 / 8 단계 완성</span>
  </div>
  <div class="prog-track">
    <div class="prog-bar" id="prog-bar" style="width: 25%"></div>
  </div>
</div>

<div class="stages" id="stages-grid"></div>

<div class="notice">
  <div class="notice-box">🔒 잠긴 단계는 순서대로 추가될 예정이에요</div>
</div>

<script>
const STAGES = [
  {
    dan: 1,
    chars: '春夏秋冬花風友各部限',
    file: 'hanja_5gup_1dan_final.html',
    color: '#378add',
    done: true,
  },
  {
    dan: 2,
    chars: '太去信便成當親高才對',
    file: 'hanja_5gup_2dan_final.html',
    color: '#7f77dd',
    done: true,
  },
  { dan: 3, chars: '??????????' , file: '', color: '#d85a30', done: false },
  { dan: 4, chars: '??????????' , file: '', color: '#1d9e75', done: false },
  { dan: 5, chars: '??????????' , file: '', color: '#ba7517', done: false },
  { dan: 6, chars: '??????????' , file: '', color: '#d4537e', done: false },
  { dan: 7, chars: '??????????' , file: '', color: '#639922', done: false },
  { dan: 8, chars: '??????????' , file: '', color: '#185fa5', done: false },
];

const colors = ['#378add','#7f77dd','#d85a30','#1d9e75','#ba7517','#d4537e','#639922','#185fa5'];

function buildStages() {
  const grid = document.getElementById('stages-grid');
  STAGES.forEach(s => {
    const card = document.createElement(s.done ? 'a' : 'div');
    card.className = 'stage-card ' + (s.done ? 'active' : 'locked');
    if (s.done) card.href = s.file;

    const bar = document.createElement('div');
    bar.className = 'stage-color-bar';
    bar.style.background = s.done ? s.color : '#e0e0dc';

    const num = document.createElement('div');
    num.className = 'stage-num';
    num.textContent = s.dan + '단계';

    const title = document.createElement('div');
    title.className = 'stage-title';
    title.textContent = s.done ? '학습하기' : '준비 중';

    const chars = document.createElement('div');
    chars.className = 'stage-chars';
    chars.textContent = s.done
      ? s.chars.split('').join(' ')
      : '· · · · · · · · · ·';

    const footer = document.createElement('div');
    footer.className = 'stage-footer';

    const count = document.createElement('span');
    count.className = 'stage-count';
    count.textContent = '10자 · 4가지 활동';

    const arrow = document.createElement('span');
    arrow.className = 'stage-arrow';
    arrow.textContent = s.done ? '→' : '🔒';

    footer.appendChild(count);
    footer.appendChild(arrow);

    card.appendChild(bar);
    card.appendChild(num);
    card.appendChild(title);
    card.appendChild(chars);
    card.appendChild(footer);

    if (!s.done) {
      const lock = document.createElementNS('http://www.w3.org/2000/svg','svg');
      lock.setAttribute('class','lock-icon');
      lock.setAttribute('viewBox','0 0 24 24');
      lock.setAttribute('fill','none');
      lock.setAttribute('stroke','currentColor');
      lock.setAttribute('stroke-width','2');
      lock.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>';
      card.appendChild(lock);
    }

    grid.appendChild(card);
  });
}

buildStages();
</script>
</body>
</html>
